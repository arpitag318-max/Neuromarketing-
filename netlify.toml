[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  ROLLUP_DISABLE_NATIVE = "true"

[dev]
  command = "vite dev"
  port = 8080

# Route for the Edge Function (no wall-clock timeout, unlike serverless functions)
[[edge_functions]]
  function = "analyze-stream"
  path = "/api/analyze-stream"
