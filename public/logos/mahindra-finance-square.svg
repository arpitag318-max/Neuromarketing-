<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Mahindra Finance Square Logo Badge -->
  <!-- Red rounded rectangle with white M icon and FINANCE text -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  
  <!-- Badge background -->
  <rect x="4" y="4" width="192" height="192" rx="28" ry="28" fill="url(#bg)"/>
  
  <!-- Stylized M icon (matching official Mahindra mark) -->
  <g fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left arch -->
    <path d="M 52,130 L 52,85 C 52,65 65,52 85,52"/>
    <!-- Center arch -->
    <path d="M 85,52 C 100,52 100,52 115,52"/>
    <!-- Right arch -->
    <path d="M 115,52 C 135,52 148,65 148,85 L 148,130"/>
    <!-- Center dip -->
    <path d="M 85,52 L 85,85 C 85,100 100,105 100,105 C 100,105 115,100 115,85 L 115,52"/>
  </g>
  
  <!-- FINANCE text -->
  <text x="100" y="170" text-anchor="middle" fill="white" font-family="'Inter','Arial',sans-serif" font-weight="700" font-size="22" letter-spacing="4">FINANCE</text>
</svg>
